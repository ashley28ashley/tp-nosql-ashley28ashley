<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Pokédex API Tester</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Pokédex — API Tester</h1>
    <nav>
      <button onclick="showSection('auth')">Auth</button>
      <button onclick="showSection('list')">Pokémons</button>
      <button onclick="showSection('create')">Créer</button>
    </nav>
  </header>

  <!-- AUTH -->
  <section id="auth" class="section active">
    <h2>Authentification</h2>

    <div class="card">
      <h3>Inscription</h3>
      <input id="reg-username" placeholder="Nom d'utilisateur">
      <input id="reg-password" placeholder="Mot de passe" type="password">
      <button onclick="register()">S'inscrire</button>
      <p id="reg-result"></p>
    </div>

    <div class="card">
      <h3>Connexion</h3>
      <input id="login-username" placeholder="Nom d'utilisateur">
      <input id="login-password" placeholder="Mot de passe" type="password">
      <button onclick="login()">Se connecter</button>
      <p id="login-result"></p>
    </div>

    <div class="card">
      <h3>Token actuel</h3>
      <pre id="token-display">(aucun token)</pre>
      <button onclick="logout()">Se déconnecter</button>
    </div>
  </section>

  <!-- LIST -->
  <section id="list" class="section">
    <h2>Liste des Pokémons</h2>

    <div class="filters">
      <input id="search-name" placeholder="Nom (anglais)">
      <input id="search-type" placeholder="Type (ex: Fire)">
      <button onclick="loadPokemons()">Rechercher</button>
    </div>

    <div id="pokemon-list" class="grid"></div>
  </section>

  <!-- CREATE -->
  <section id="create" class="section">
    <h2>Créer un Pokémon</h2>

    <div class="card">
      <input id="create-id" placeholder="ID">
      <input id="create-name-en" placeholder="Nom anglais">
      <input id="create-name-fr" placeholder="Nom français">
      <input id="create-type" placeholder="Types séparés par des virgules">
      <input id="create-hp" placeholder="HP">
      <input id="create-attack" placeholder="Attack">
      <input id="create-defense" placeholder="Defense">
      <input id="create-speed" placeholder="Speed">
      <input id="create-image" placeholder="URL image">

      <button onclick="createPokemon()">Créer</button>
      <p id="create-result"></p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
